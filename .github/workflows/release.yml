name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/version.h'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "src/version.h" -Raw
          $version = [regex]::Match($content, '#define GAME_VERSION "([^"]+)"').Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Setup MSYS2 (MINGW32)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: false
          install: mingw-w64-i686-gcc

      - name: Compile
        shell: msys2 {0}
        run: |
          srcs=$(find src -name '*.c')
          gcc $srcs -o bin/game.exe -Ibin/allegro/include -Lbin/allegro/lib -lallegro -lallegro_font -lallegro_ttf -lallegro_image -lallegro_primitives -lallegro_audio -lallegro_acodec -lallegro_dialog -lallegro_main

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release"
          Copy-Item "bin/game.exe" "release/"
          Copy-Item "bin/*.dll" "release/"
          Copy-Item -Recurse "assets" "release/assets"
          Compress-Archive -Path "release/*" -DestinationPath "HiddenFront-v${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Hidden Front v${{ steps.version.outputs.VERSION }}
          files: HiddenFront-v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
