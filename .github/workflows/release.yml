name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/version.h'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "src/version.h" -Raw
          $version = [regex]::Match($content, '#define GAME_VERSION "([^"]+)"').Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Setup MinGW
        shell: pwsh
        run: |
          choco upgrade mingw -y --no-progress
          echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Compile
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          $srcs = Get-ChildItem -Path "$root/src" -Filter "*.c" -Recurse | ForEach-Object { $_.FullName }
          $cflags = "-I`"$root/bin/allegro/include`""
          $ldflags = "-L`"$root/bin/allegro/lib`" -lallegro -lallegro_font -lallegro_ttf -lallegro_image -lallegro_primitives -lallegro_audio -lallegro_acodec -lallegro_dialog -lallegro_main"
          $cmd = "gcc $($srcs -join ' ') -o `"$root/bin/game.exe`" $cflags $ldflags"
          Write-Host "Running: $cmd"
          Invoke-Expression $cmd

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release"
          Copy-Item "bin/game.exe" "release/"
          Copy-Item "bin/*.dll" "release/"
          Copy-Item -Recurse "assets" "release/assets"
          Compress-Archive -Path "release/*" -DestinationPath "HiddenFront-v${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Hidden Front v${{ steps.version.outputs.VERSION }}
          files: HiddenFront-v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
